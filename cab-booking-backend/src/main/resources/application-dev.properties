# ==========================================
# DataSource / PostgreSQL
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/cabdb
spring.datasource.username=cabuser
spring.datasource.password=cabpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Server
# ==========================================
server.port=8080

# ==========================================
# JWT Configuration
# ==========================================
app.jwt.secret=9a2f8c4e6b0d71f3e8g9h0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z7a8b9c0d1
app.jwt.expiration-ms=86400000
app.jwt.refresh-token-duration-ms=604800000

# ==========================================
# Logging
# ==========================================
logging.level.org.springframework=INFO
logging.level.com.cabbooking=DEBUG